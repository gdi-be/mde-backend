name: Pull Request

on: pull_request

jobs:
  commitlint:
    name: Lint commit messages
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: wagoid/commitlint-github-action@v6

  test_and_build:
    name: Run tests and build artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Run tests
        run: mvn -B -nsu test -pl '!mde-integration-tests'

      - name: Build artifacts
        run: mvn -B -nsu package -pl '!mde-integration-tests'

  integration_tests:
    name: Run integration tests (Testcontainers)
    runs-on: ubuntu-latest
    needs: test_and_build
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install parent modules
        run: mvn -B -nsu clean install -DskipTests -pl '!mde-integration-tests'

      - name: Run integration tests
        run: mvn -B verify -pl mde-integration-tests -am
